<body class="font-sans antialiased">

        <div class="absolute top-40 left-40 w-80 h-80 bg-gray-300 rounded-full mix-blend-multiply filter blur-xl opacity-15 animate-float" style="animation-delay: 4s;"></div>

    <div class="relative z-10 w-full max-w-sm">
        <!-- Logo Section -->
        <div class="text-center mb-6">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-white rounded-full shadow-lg mb-3">
                <i class="fas fa-calculator text-2xl text-blue-600"></i>
            </div>

            <form method="POST" action="http://127.0.0.1:8000/login" class="space-y-5">
                <input type="hidden" name="_token" value="1ixLNwiM5fwoAJOg0f7SgVTQFtjQpQs55gZhwpsR" autocomplete="off">                
                <!-- Email Field -->
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1.5">

                    </label>
                    <div class="relative">

                    </div>
                                    </div>

                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1.5">
                        <i class="fas fa-lock mr-2 text-blue-600"></i>Password
                    </label>
                    <div class="relative">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            class="w-full px-3 py-2.5 pl-10 pr-10 bg-white border border-blue-300 rounded-lg text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-300 "
                            placeholder="Enter your password"
                            required
                        >
                        <i class="fas fa-lock absolute left-3 top-1/2 transform -translate-y-1/2 text-blue-600 text-sm"></i>
                        <button
                            type="button"
                            onclick="togglePassword('password')"
                            class="absolute right-3 top-1/2 transform -translate-y-1/2 text-blue-600 hover:text-blue-700 transition-colors"

                        >

                        <input

                            name="remember" 
                            class="w-4 h-4 text-blue-600 bg-white border-gray-300 rounded focus:ring-blue-500 focus:ring-2"
                        >
                        <span class="ml-2 text-sm text-gray-700">Remember me</span>
                    </label>
                    <a href="http://127.0.0.1:8000/forgot-password" class="text-sm text-blue-600 hover:text-blue-700 transition-colors">
